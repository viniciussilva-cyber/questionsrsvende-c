<!DOCTYPE html>
<html lang="pt-PT" class="h-full bg-[#121214]">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VENDE-C - Painel de Questionários R&S</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            darkBg: '#121214',
                            cardBg: '#1A1A1E',
                            cardHover: '#222228',
                            pink: '#FF007F',
                            pinkHover: '#E6006F',
                            pinkGlow: 'rgba(255, 0, 127, 0.4)',
                            textSecondary: '#8F8F9B',
                            border: '#2C2C35'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        .secure-mode {
            user-select: none !important;
            -webkit-user-select: none !important;
            -moz-user-select: none !important;
            -ms-user-select: none !important;
        }
        
        @media print {
            body {
                display: none !important;
            }
        }

        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #121214;
        }
        ::-webkit-scrollbar-thumb {
            background: #2C2C35;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #FF007F;
        }
    </style>
</head>
<body class="h-full font-sans text-slate-100 antialiased bg-brand-darkBg flex flex-col overflow-hidden">

    <div id="db-loading-screen" class="fixed inset-0 z-[100] flex flex-col items-center justify-center bg-brand-darkBg space-y-4">
        <div class="w-16 h-16 animate-spin rounded-full border-4 border-brand-pink/20 border-t-brand-pink"></div>
        <p class="text-sm text-brand-textSecondary font-semibold">A sincronizar com o Servidor Seguro VENDE-C...</p>
    </div>

    <div id="screen-login" class="fixed inset-0 z-50 flex items-center justify-center bg-brand-darkBg px-4 hidden">
        <div class="max-w-md w-full bg-brand-cardBg rounded-3xl p-8 border border-brand-border/60 shadow-[0_8px_32px_rgba(0,0,0,0.5)]">
            <div class="flex flex-col items-center mb-8">
                <span class="text-white font-black text-4xl tracking-wider select-none">VENDE-<span class="text-brand-pink">C</span></span>
                <p class="text-[10px] text-brand-pink font-semibold uppercase tracking-widest mt-1">Recrutamento & Seleção</p>
            </div>

            <div class="text-center mb-6">
                <h1 class="text-xl font-bold text-white tracking-tight">Bem-vindo ao RH</h1>
                <p class="text-xs text-brand-textSecondary mt-1">Aceda utilizando as credenciais autorizadas de R&S.</p>
            </div>

            <div id="login-error-alert" class="hidden mb-4 p-3.5 bg-red-500/10 border border-red-500/20 rounded-xl text-xs text-red-400 flex items-center space-x-2">
                <i class="fa-solid fa-circle-exclamation text-sm shrink-0"></i>
                <span>E-mail não autorizado ou palavra-passe incorreta.</span>
            </div>

            <form id="form-login" class="space-y-4">
                <div>
                    <label class="block text-[9px] font-bold text-brand-textSecondary tracking-widest uppercase mb-1.5">E-Mail Corporativo</label>
                    <input type="email" id="login-email" required value="vagas@vende-c.com" class="w-full px-4 py-3 bg-brand-darkBg border border-brand-border rounded-xl text-white text-sm focus:outline-none focus:ring-2 focus:ring-brand-pink/50 focus:border-brand-pink transition-all placeholder-brand-textSecondary/30" placeholder="nome.sobrenome@vende-c.com">
                </div>

                <div>
                    <label class="block text-[9px] font-bold text-brand-textSecondary tracking-widest uppercase mb-1.5">Palavra-passe Corporativa</label>
                    <div class="relative">
                        <input type="password" id="login-password" required value="rh2026!" class="w-full pl-4 pr-11 py-3 bg-brand-darkBg border border-brand-border rounded-xl text-white text-sm focus:outline-none focus:ring-2 focus:ring-brand-pink/50 focus:border-brand-pink transition-all">
                        <button type="button" id="btn-toggle-password" class="absolute right-3.5 top-3.5 text-brand-textSecondary hover:text-slate-200 transition-colors">
                            <i id="password-toggle-icon" class="fa-solid fa-eye-slash text-xs"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="w-full bg-brand-pink hover:bg-brand-pinkHover text-white py-3.5 rounded-xl font-bold text-sm tracking-wide transition-all shadow-lg shadow-brand-pink/25 hover:shadow-brand-pink/40 hover:-translate-y-0.5 transform active:translate-y-0">
                    Aceder ao Painel
                </button>
            </form>
        </div>
    </div>

    <div id="main-system-layout" class="hidden h-full flex flex-row overflow-hidden">

        <aside id="system-sidebar" class="w-64 bg-brand-cardBg border-r border-brand-border/60 flex flex-col justify-between shrink-0 transition-all duration-300">
            <div>
                <div class="h-20 flex items-center px-6 border-b border-brand-border/40">
                    <span class="text-white font-black text-2xl tracking-wider select-none">VENDE-<span class="text-brand-pink">C</span></span>
                </div>

                <nav class="p-4 space-y-1">
                    <button id="menu-painel" class="w-full flex items-center space-x-3 px-4 py-3 rounded-xl text-sm font-semibold transition-all duration-150 text-white bg-brand-pink shadow-md shadow-brand-pink/10">
                        <i class="fa-solid fa-folder-open w-5 text-center"></i>
                        <span>Painel de Questionários</span>
                    </button>
                    <button id="menu-results" class="w-full flex items-center space-x-3 px-4 py-3 rounded-xl text-sm font-semibold transition-all duration-150 text-brand-textSecondary hover:text-white hover:bg-white/5">
                        <i class="fa-solid fa-chart-pie w-5 text-center"></i>
                        <span>Painel de Respostas</span>
                    </button>
                </nav>
            </div>

            <div class="p-4 border-t border-brand-border/40 bg-brand-darkBg/30">
                <div class="flex items-center space-x-3">
                    <div id="avatar-rh" class="w-9 h-9 rounded-full bg-brand-pink/20 border border-brand-pink flex items-center justify-center text-xs font-bold text-white uppercase">RH</div>
                    <div class="overflow-hidden">
                        <p class="text-xs font-bold text-white truncate font-semibold">Administrador RH</p>
                        <p id="user-display-email" class="text-[10px] text-brand-textSecondary truncate font-medium">vagas@vende-c.com</p>
                    </div>
                </div>
            </div>
        </aside>

        <main class="flex-1 flex flex-col overflow-hidden">
            <header id="rh-system-header" class="h-20 border-b border-brand-border/60 bg-brand-cardBg/20 flex items-center justify-between px-8 shrink-0">
                <div class="flex items-center space-x-4">
                    <button onclick="window.toggleSidebar()" class="p-2 bg-brand-cardBg border border-brand-border rounded-xl text-brand-textSecondary hover:text-white transition-colors" title="Alternar Menu Lateral">
                        <i class="fa-solid fa-bars text-sm"></i>
                    </button>
                    <div>
                        <span id="header-context-title" class="text-xs uppercase tracking-widest font-extrabold text-brand-pink">Questionários</span>
                        <h2 id="header-context-subtitle
